 syntax="proto3";
 package
// metamodel_version: 1.7.0
// The chemical used as the stressor chemical in an exposure event.
message ChemicalEntity
 {
  uriorcurie uri = 0
  uriorcurie chebiId = 0
  string casId = 0
  string chemicalName = 0
 repeated  string synonym = 0
 }
// A subject serves as a reference for assessing phenotypic outcome in the phenotype observation set.
message Control
 {
  integer id = 0
  string controlType = 0
  vehicleEnumeration vehicleIfTreated = 0
  string comment = 0
 repeated  controlImage controlImage = 0
 }
// An image associated with a control, taken at the same developmental stage as the corresponding phenotype observation.
message ControlImage
 {
  integer id = 0
  string phenotypeId = 0
  string magnification = 0
  string resolution = 0
  string scaleBar = 0
  string phenotypeComments = 0
 }
// A group of observations (phenotypic outcomes and their control) that are linked by a common exposure event and subject, and that are part of a study.
message Experiment
 {
  integer id = 0
  boolean standardRearingCondition = 0
  string rearingConditionComment = 0
  fish fish = 0
 repeated  control control = 0
 repeated  exposureEvent exposureEvent = 0
 }
// An occurrence in a study where a subject is exposed to a stressor under defined conditions.
message ExposureEvent
 {
  integer id = 0
 repeated  stressorChemical stressor = 0
 repeated  vehicleEnumeration vehicle = 0
  exposureRoute route = 0
  regimen regimen = 0
  uriorcurie exposureStartStage = 0
  uriorcurie exposureEndStage = 0
  string comment = 0
  exposureType exposureType = 0
  string additionalExposureCondition = 0
 repeated  phenotypeObservationSet phenotypeObservation = 0
 }
// A route-of-exposure term. Term URIs are expected to be reachable from
// EXO:0000154 (route of exposure) in the EXO ontology.
// 
message ExposureRoute
 {
  uriorcurie termUri = 0
  string termLabel = 0
 }
// An exposure-type term from ECTO.
// 
message ExposureType
 {
  uriorcurie termUri = 0
  string termLabel = 0
 }
// Zebrafish used as subject in the study.
message Fish
 {
  string zfinId = 0
  string name = 0
 }
// An image associated with a phenotype observation.
message Image
 {
  integer id = 0
  string magnification = 0
  string resolution = 0
  string scaleBar = 0
 }
// Any measurable or visible trait change in the subject as a result of exposure.
message Phenotype
 {
  integer id = 0
  uriorcurie stage = 0
  quantityValue prevalence = 0
  severityEnum severity = 0
  phenotypeTerm phenotypeTermId = 0
 }
// An observation set containing control and phenotypic outcome resulting from an exposure event.
message PhenotypeObservationSet
 {
  integer id = 0
 repeated  image image = 0
 repeated  phenotype phenotype = 0
 repeated  controlImage controlImage = 0
 }
// A phenotype ontology term from the Zebrafish Phenotype ontology (ZP).
message PhenotypeTerm
 {
  uriorcurie termUri = 0
  string termLabel = 0
 }
// A value of an attribute that is quantitative and measurable, expressed as a combination of a unit and a numeric value
message QuantityValue
 {
  string unit = 0
  string numericValue = 0
 }
// The schedule and pattern of an exposure event.
message Regimen
 {
  integer id = 0
  exposureRegimenTypeEnum exposureRegimenType = 0
  quantityValue intervalBetweenIndividualExposures = 0
  quantityValue totalExposureDuration = 0
  quantityValue individualExposureDuration = 0
  integer numberOfIndividualExposure = 0
 }
// A chemical, that elicit a response (a phenotype) in a subject when when encountered through exposure.
message StressorChemical
 {
  integer id = 0
  chemicalEntity chemicalId = 0
  string manufacturer = 0
  quantityValue concentration = 0
  string comment = 0
 }
// A toxicological investigation, including the experimental conditions and phenotypic outcomes, with information provenance.
message Study
 {
  integer id = 0
 repeated  experiment experiment = 0
  string publication = 0
 repeated  uriorcurie annotator = 0
  uriorcurie lab = 0
 }
