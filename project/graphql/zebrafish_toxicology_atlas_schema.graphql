# metamodel_version: 1.7.0
enum ExposureRegimenTypeEnum
  {
    continuous
    repeated
  }

enum SeverityEnum
  {
    mild
    moderate
    severe
  }

enum VehicleEnumeration
  {
    ethanol
    dmso
  }

type ChemicalEntity
  {
    uri: String!
    chebiId: String
    casId: String
    chemicalName: String
    synonym: [String]
  }

type Control
  {
    id: Int!
    controlType: String
    vehicleIfTreated: VehicleEnumeration
    comment: String
    controlImage: [ControlImage]
  }

type ControlImage
  {
    id: Int!
    phenotypeId: String
    magnification: String
    resolution: String
    scaleBar: String
    phenotypeComments: String
  }

type Experiment
  {
    id: Int!
    standardRearingCondition: Boolean
    rearingConditionComment: String
    fish: Fish
    control: [Control]
    exposureEvent: [ExposureEvent]
  }

type ExposureEvent
  {
    id: Int!
    stressor: [StressorChemical]
    vehicle: [VehicleEnumeration]
    route: ExposureRoute
    regimen: Regimen
    exposureStartStage: String
    exposureEndStage: String
    comment: String
    exposureType: ExposureType
    additionalExposureCondition: String
    phenotypeObservation: [PhenotypeObservationSet]
  }

type ExposureRoute
  {
    termUri: String!
    termLabel: String!
  }

type ExposureType
  {
    termUri: String!
    termLabel: String!
  }

type Fish
  {
    zfinId: String!
    name: String!
  }

type Image
  {
    id: Int!
    magnification: String
    resolution: String
    scaleBar: String
  }

interface OntologyEntity
  {
  }

type Phenotype
  {
    id: Int!
    stage: String
    prevalence: QuantityValue
    severity: SeverityEnum
    phenotypeTermId: PhenotypeTerm
  }

type PhenotypeObservationSet
  {
    id: Int!
    image: [Image]
    phenotype: [Phenotype]
    controlImage: [ControlImage]
  }

type PhenotypeTerm
  {
    termUri: String!
    termLabel: String
  }

type QuantityValue
  {
    unit: String
    numericValue: String
  }

type Regimen
  {
    id: Int!
    exposureRegimenType: ExposureRegimenTypeEnum
    intervalBetweenIndividualExposures: QuantityValue
    totalExposureDuration: QuantityValue
    individualExposureDuration: QuantityValue
    numberOfIndividualExposure: Int
  }

type StressorChemical
  {
    id: Int!
    chemicalId: ChemicalEntity!
    manufacturer: String
    concentration: QuantityValue!
    comment: String
  }

type Study
  {
    id: Int!
    experiment: [Experiment]
    publication: String
    annotator: [String]
    lab: String
  }

interface ZappEntity
  {
    id: Int!
  }

interface ZfinEntity
  {
    zfinId: String!
  }
