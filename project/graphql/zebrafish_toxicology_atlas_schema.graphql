# metamodel_version: 1.7.0
enum ExposureRegimenTypeEnum
  {
    continuous
    repeated
  }

enum ManufacturerEnum
  {
    sigma_aldrich
    merck_kgaa
    millipore_sigma
    thermo_fisher_scientific
    fisher_scientific
    avantor
    vwr
    new_england_biolabs
    bio_rad_laboratories
    promega_corporation
    corning_life_sciences
    lonza_group
    tocris_bioscience
    cayman_chemical_company
    selleck_chemicals
    medchemexpress
    enzo_life_sciences
    aquaneering_inc
    pentair_aquatic_eco_systems
    tecniplast
    zebrafish_international_resource_center
    tokyo_chemical_industry
    alfa_aesar
    acros_organics
    honeywell
    abcam
    cell_signaling_technology
    genscript
    addgene
    thomas_scientific
    cole_parmer
  }

enum SeverityEnum
  {
    mild
    moderate
    severe
  }

enum VehicleEnum
  {
    acetone
    acetonitrile
    albumin_bsa
    butanone_mek
    cyclodextrin_hpbcd
    dimethyl_formamide
    dmso
    embryonic_media
    ethanol
    glycerol
    isopropanol
    methanol
    methylcellulose
    pbs
    polyethylene_glycol
    propylene_glycol
    solketal
    water
  }

type Control
  {
    id: Int!
    controlType: String
    vehicleIfTreated: VehicleOfTransmission
    comment: String
    controlImage: [ControlImage]
  }

type ControlImage
  {
    id: Int!
    phenotypeId: String
    magnification: String
    resolution: String
    scaleBar: String
    phenotypeComments: String
  }

type Experiment
  {
    id: Int!
    standardRearingCondition: Boolean
    rearingConditionComment: String
    fish: Fish
    control: [Control]
    exposureEvent: [ExposureEvent]
  }

type ExposureEvent
  {
    id: Int!
    stressor: [StressorChemical]
    vehicle: [VehicleOfTransmission]
    route: ExposureRoute
    regimen: Regimen
    exposureStartStage: String
    exposureEndStage: String
    comment: String
    exposureType: ExposureType
    additionalExposureCondition: String
    phenotypeObservation: [PhenotypeObservationSet]
  }

type ExposureRoute
  {
    termUri: String!
    termLabel: String!
  }

type ExposureType
  {
    termUri: String!
    termLabel: String!
  }

type Fish
  {
    zfinId: String!
    name: String!
  }

type Image
  {
    id: Int!
    magnification: String
    resolution: String
    scaleBar: String
  }

interface OntologyEntity
  {
  }

type Phenotype
  {
    id: Int!
    stage: String
    prevalence: QuantityValue
    severity: SeverityEnum
    phenotypeTermId: PhenotypeTerm
  }

type PhenotypeObservationSet
  {
    id: Int!
    image: [Image]
    phenotype: [Phenotype]
    controlImage: [ControlImage]
  }

type PhenotypeTerm
  {
    termUri: String!
    termLabel: String
  }

type QuantityValue
  {
    unit: String
    numericValue: String
  }

type Regimen
  {
    id: Int!
    exposureRegimenType: ExposureRegimenTypeEnum
    intervalBetweenIndividualExposures: QuantityValue
    totalExposureDuration: QuantityValue
    individualExposureDuration: QuantityValue
    numberOfIndividualExposure: Int
  }

type StressorChemical
  {
    id: Int!
    chemicalId: String
    casId: String
    chemicalName: String
    synonym: [String]
    manufacturer: ManufacturerEnum
    concentration: QuantityValue!
    comment: String
  }

type Study
  {
    id: Int!
    experiment: [Experiment]
    publication: String
    annotator: [String]
    lab: String
  }

type VehicleOfTransmission
  {
    id: Int!
    vehicleType: VehicleEnum!
    manufacturer: ManufacturerEnum
    concentration: QuantityValue!
    comment: String
  }

interface ZappEntity
  {
    id: Int!
  }

interface ZfinEntity
  {
    zfinId: String!
  }
